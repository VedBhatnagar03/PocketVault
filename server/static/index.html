<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PocketVault</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --accent: #6c63ff;
      --text: #e8e8e8;
      --muted: #888;
      --danger: #e05252;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo { font-size: 1.2rem; font-weight: 700; letter-spacing: -0.5px; }
    .logo span { color: var(--accent); }

    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      color: var(--muted);
      flex: 1;
      margin: 0 16px;
      overflow: hidden;
    }
    .breadcrumb span { cursor: pointer; }
    .breadcrumb span:hover { color: var(--text); }
    .breadcrumb .sep { user-select: none; }

    .actions { display: flex; gap: 8px; }

    button {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    button.secondary { background: var(--border); color: var(--text); }
    button.danger { background: var(--danger); }

    #upload-input { display: none; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 4px;
      padding: 12px;
    }

    @media (max-width: 480px) {
      .grid { grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 4px; }
    }

    .tile {
      aspect-ratio: 1;
      border-radius: 6px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
    }
    .tile:hover .tile-overlay { opacity: 1; }

    .tile img, .tile video {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    .tile-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.5);
      opacity: 0;
      transition: opacity 0.15s;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 8px;
    }

    .tile-name {
      font-size: 0.7rem;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tile-delete {
      position: absolute;
      top: 6px; right: 6px;
      background: rgba(220,50,50,0.85);
      border: none;
      border-radius: 50%;
      width: 24px; height: 24px;
      padding: 0;
      font-size: 0.75rem;
      display: flex; align-items: center; justify-content: center;
    }

    .folder-tile {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .folder-tile .folder-icon { font-size: 2.5rem; }

    .video-badge {
      position: absolute;
      top: 6px; left: 6px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      font-size: 0.65rem;
      padding: 2px 5px;
      border-radius: 4px;
    }

    /* Lightbox */
    #lightbox {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #lightbox.open { display: flex; }

    #lightbox img, #lightbox video {
      max-width: 95vw;
      max-height: 85vh;
      object-fit: contain;
      border-radius: 8px;
    }

    #lightbox-close {
      position: absolute;
      top: 16px; right: 16px;
      background: var(--surface);
      border-radius: 50%;
      width: 36px; height: 36px;
      font-size: 1.1rem;
      padding: 0;
      display: flex; align-items: center; justify-content: center;
    }

    #lightbox-name {
      margin-top: 12px;
      font-size: 0.85rem;
      color: var(--muted);
    }

    /* Upload progress */
    #upload-bar {
      display: none;
      position: fixed;
      bottom: 20px; left: 50%;
      transform: translateX(-50%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 20px;
      z-index: 200;
      font-size: 0.85rem;
      min-width: 220px;
      text-align: center;
    }

    .empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }
    .empty .icon { font-size: 3rem; margin-bottom: 12px; }

    /* New folder modal */
    #folder-modal {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 150;
      align-items: center;
      justify-content: center;
    }
    #folder-modal.open { display: flex; }
    .modal-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      width: 90%;
      max-width: 320px;
    }
    .modal-box h3 { margin-bottom: 14px; }
    .modal-box input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-bottom: 14px;
    }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  </style>
</head>
<body>

<header>
  <div class="logo">Pocket<span>Vault</span></div>
  <div class="breadcrumb" id="breadcrumb"></div>
  <div class="actions">
    <button class="secondary" onclick="openFolderModal()">+ Folder</button>
    <button onclick="document.getElementById('upload-input').click()">Upload</button>
    <input type="file" id="upload-input" multiple accept="image/*,video/*" onchange="uploadFiles(this.files)" />
  </div>
</header>

<div class="grid" id="grid"></div>

<!-- Lightbox -->
<div id="lightbox">
  <button id="lightbox-close" onclick="closeLightbox()">✕</button>
  <div id="lightbox-content"></div>
  <div id="lightbox-name"></div>
</div>

<!-- Upload progress -->
<div id="upload-bar" id="upload-bar"></div>

<!-- New folder modal -->
<div id="folder-modal">
  <div class="modal-box">
    <h3>New Folder</h3>
    <input type="text" id="folder-name-input" placeholder="Folder name" />
    <div class="modal-actions">
      <button class="secondary" onclick="closeFolderModal()">Cancel</button>
      <button onclick="createFolder()">Create</button>
    </div>
  </div>
</div>

<script>
  let currentFolder = "";

  async function apiFetch(path, options = {}) {
    const res = await fetch(path, options);
    if (res.status === 401) {
      alert("Session expired — reload and log in again.");
      return null;
    }
    return res;
  }

  async function loadMedia(folder = "") {
    currentFolder = folder;
    renderBreadcrumb(folder);
    const grid = document.getElementById("grid");
    grid.innerHTML = "<div style='padding:20px;color:var(--muted)'>Loading...</div>";

    const params = folder ? `?folder=${encodeURIComponent(folder)}` : "";
    const res = await apiFetch(`/api/media${params}`);
    if (!res) return;
    const data = await res.json();

    grid.innerHTML = "";

    if (data.items.length === 0) {
      grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="icon">📂</div>No media here yet.<br/>Upload some files to get started.</div>`;
      return;
    }

    for (const item of data.items) {
      grid.appendChild(buildTile(item));
    }
  }

  function buildTile(item) {
    const div = document.createElement("div");
    div.className = "tile";

    if (item.type === "folder") {
      div.classList.add("folder-tile");
      div.innerHTML = `<div class="folder-icon">📁</div><div>${item.name}</div>`;
      div.onclick = () => loadMedia(item.path);
      return div;
    }

    const url = `/api/media/file/${item.path}`;

    if (item.type === "image") {
      const img = document.createElement("img");
      img.src = url;
      img.loading = "lazy";
      img.alt = item.name;
      div.appendChild(img);
    } else {
      const vid = document.createElement("video");
      vid.src = url;
      vid.preload = "metadata";
      div.appendChild(vid);
      const badge = document.createElement("div");
      badge.className = "video-badge";
      badge.textContent = "▶ VIDEO";
      div.appendChild(badge);
    }

    const overlay = document.createElement("div");
    overlay.className = "tile-overlay";
    overlay.innerHTML = `<div class="tile-name">${item.name}</div>`;
    div.appendChild(overlay);

    const del = document.createElement("button");
    del.className = "tile-delete";
    del.textContent = "✕";
    del.onclick = async (e) => {
      e.stopPropagation();
      if (!confirm(`Delete ${item.name}?`)) return;
      const r = await apiFetch(`/api/media/file/${item.path}`, { method: "DELETE" });
      if (r && r.ok) loadMedia(currentFolder);
    };
    div.appendChild(del);

    div.onclick = () => openLightbox(item, url);
    return div;
  }

  function openLightbox(item, url) {
    const lb = document.getElementById("lightbox");
    const content = document.getElementById("lightbox-content");
    document.getElementById("lightbox-name").textContent = item.name;
    content.innerHTML = "";
    if (item.type === "image") {
      const img = document.createElement("img");
      img.src = url;
      content.appendChild(img);
    } else {
      const vid = document.createElement("video");
      vid.src = url;
      vid.controls = true;
      vid.autoplay = true;
      content.appendChild(vid);
    }
    lb.classList.add("open");
  }

  function closeLightbox() {
    const lb = document.getElementById("lightbox");
    lb.classList.remove("open");
    document.getElementById("lightbox-content").innerHTML = "";
  }

  document.getElementById("lightbox").addEventListener("click", function(e) {
    if (e.target === this) closeLightbox();
  });

  async function uploadFiles(files) {
    if (!files.length) return;
    const bar = document.getElementById("upload-bar");
    bar.style.display = "block";
    bar.textContent = `Uploading 0 / ${files.length}...`;

    const form = new FormData();
    for (const f of files) form.append("files", f);
    if (currentFolder) form.append("folder", currentFolder);

    const res = await apiFetch("/api/upload", { method: "POST", body: form });
    bar.style.display = "none";
    document.getElementById("upload-input").value = "";

    if (res && res.ok) {
      const data = await res.json();
      bar.textContent = `Uploaded ${data.uploaded.length} file(s)`;
      bar.style.display = "block";
      setTimeout(() => { bar.style.display = "none"; }, 2500);
      loadMedia(currentFolder);
    }
  }

  function renderBreadcrumb(folder) {
    const bc = document.getElementById("breadcrumb");
    bc.innerHTML = "";
    const root = document.createElement("span");
    root.textContent = "Home";
    root.onclick = () => loadMedia("");
    bc.appendChild(root);

    if (!folder) return;
    const parts = folder.split("/");
    parts.forEach((part, i) => {
      const sep = document.createElement("span");
      sep.className = "sep";
      sep.textContent = " / ";
      bc.appendChild(sep);
      const span = document.createElement("span");
      span.textContent = part;
      const path = parts.slice(0, i + 1).join("/");
      span.onclick = () => loadMedia(path);
      bc.appendChild(span);
    });
  }

  function openFolderModal() {
    document.getElementById("folder-modal").classList.add("open");
    document.getElementById("folder-name-input").focus();
  }
  function closeFolderModal() {
    document.getElementById("folder-modal").classList.remove("open");
    document.getElementById("folder-name-input").value = "";
  }
  async function createFolder() {
    const name = document.getElementById("folder-name-input").value.trim();
    if (!name) return;
    const params = new URLSearchParams({ name });
    if (currentFolder) params.append("parent", currentFolder);
    await apiFetch(`/api/folder?${params}`, { method: "POST" });
    closeFolderModal();
    loadMedia(currentFolder);
  }

  document.getElementById("folder-name-input").addEventListener("keydown", e => {
    if (e.key === "Enter") createFolder();
    if (e.key === "Escape") closeFolderModal();
  });

  loadMedia();
</script>
</body>
</html>
